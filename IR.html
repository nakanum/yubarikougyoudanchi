<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>統合報告書 | 夕張工業団地</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* スマホの文字サイズ自動調整をリセット */
        html { -webkit-text-size-adjust: 100%; }

        .hero {
            background: linear-gradient(135deg, #007b43 0%, #004d2c 100%);
            color: white;
            padding: 100px 20px 140px;
            text-align: center;
        }
        .hero p {
            font-size: 12px;
            letter-spacing: 0.3em;
            font-weight: bold;
            opacity: 0.8;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }
        .hero h1 {
            font-size: 32px;
            letter-spacing: 0.1em;
            margin: 0;
            line-height: 1.2;
            word-break: break-all;
        }

        .container {
            max-width: 900px; /* 少し広めに設定 */
            width: 92%;
            margin: -80px auto 60px;
            background: white;
            padding: 50px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border-radius: 4px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        h2 {
            font-size: 20px;
            border-left: 5px solid #000;
            padding-left: 15px;
            margin: 0 0 30px 0;
            font-weight: bold;
        }

        /* レポート一覧のグリッド */
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
        }

        .report-item {
            border: 1px solid #eee;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .report-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .report-thumb {
            width: 100%;
            aspect-ratio: 1 / 1.414; /* A4比率 */
            background: #f4f4f4;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .report-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .report-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .download-btn {
            display: inline-block;
            background: #007b43;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 13px;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #004d2c;
        }

        /* スマホ用調整 */
        @media (max-width: 768px) {
            .container { padding: 30px 20px; }
            .hero h1 { font-size: clamp(20px, 7vw, 32px) !important; }
            .report-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="hero">
    <p>Investor Relations</p>
    <h1>統合報告書</h1>
</div>

<div class="container">
    <section>
        <h2>統合報告書</h2>
        夕張工業団地の年度ごとの稼働に関する情報をご覧いただけます。
        <div class="report-grid">

            <!-- 報告書アイテム 2 -->
            <div class="report-item">
                <div class="report-thumb">
                    <span style="color: #ccc; font-size: 12px;">Cover Image</span>
                </div>
                <span class="report-title">統合報告書 2025</span>
                <a href="path/to/report2025.pdf" class="download-btn" download>PDFをダウンロード</a>
            </div>

        </div>
    </section>
</div>

<footer>
    © 2026 YUBARI INDUSTRIAL DISTRICT All Rights Reserved.
</footer>

<script>
    fetch('header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(error => console.error('Error:', error));
</script>

</body>
</html>
