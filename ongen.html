<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音源情報 | 夕張工業団地</title>
    <!-- 外部CSSを読み込む -->
    <link rel="stylesheet" href="style.css">
    <style>
        .hero {
            background: linear-gradient(135deg, #007b43 0%, #004d2c 100%);
            color: white;
            padding: 100px 20px 140px;
            text-align: center;
        }
        .hero p {
            font-size: 12px;
            letter-spacing: 0.3em;
            font-weight: bold;
            opacity: 0.8;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }
        .hero h1 {
            font-size: 32px;
            letter-spacing: 0.1em;
            margin: 0;
        }

        .container {
            max-width: 800px;
            width: 92%;
            margin: -80px auto 60px;
            background: white;
            padding: 50px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border-radius: 4px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        h2 {
            font-size: 20px;
            border-left: 5px solid #000;
            padding-left: 15px;
            margin: 40px 0 20px;
            font-weight: bold;
        }

        /* プレイヤー埋め込みエリアの装飾 */
        .audio-section {
            margin-bottom: 40px;
        }
        .audio-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid #eee;
        }
        .audio-card h3 {
            font-size: 14px;
            margin: 0 0 15px 0;
            color: #555;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .audio-card h3::before {
            content: "▶";
            font-size: 10px;
            color: #007b43;
        }

        /* 埋め込みプレイヤーのレスポンシブ対応 */
        iframe {
            width: 100%;
            border-radius: 12px;
            border: none;
        }

        /* 配信サイトリンクボタン */
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .platform-link {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: #fff;
            border: 1px solid #ddd;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
            border-radius: 4px;
        }
        .platform-link:hover {
            background: #f0f0f0;
            border-color: #007b43;
            color: #007b43;
        }

        @media (max-width: 768px) {
            .container { padding: 30px 20px; }
            .hero h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="hero">
    <p>Audio Archive</p>
    <h1>音源・配信情報</h1>
</div>

<div class="container">
    <section class="audio-section">
        <h2>SoundCloud (Demo & Works)</h2>
        <div class="audio-card">
            <h3>Latest Demo</h3>
            <!-- SoundCloud 埋め込み (URLから生成したコードに貼り替え可能) -->
            <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/users/924088991&color=%23007b43&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>
        </div>
    </section>

    <section class="audio-section">
        <h2>Streaming Services</h2>
        <div class="audio-card">
            <h3>Apple Music</h3>
            <!-- Apple Music の埋め込みコード -->
            <iframe allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write" frameborder="0" height="175" style="width:100%;max-width:100%;overflow:hidden;border-radius:10px;" sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation" src="https://embed.music.apple.com/jp/album/%E7%B8%B9%E8%89%B2%E3%81%AE%E5%A4%8F-ep/1734931084"></iframe>
        </div>
        <div class="audio-card">
            <h3>Spotify</h3>
            <!-- Spotify 埋め込み -->
            <iframe src="https://open.spotify.com/embed/artist/1HwXj1S3hwMTeu5P05A6lG?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </section>

</div>

<footer>
    © 2026 YUBARI INDUSTRIAL DISTRICT All Rights Reserved.
</footer>

<script>
    fetch('header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(error => console.error('Error:', error));
</script>

</body>
</html>
