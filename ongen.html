        .sub-navbar { position: fixed; top: 50px; left: 0; width: 100%; height: 45px; background-color: #ffffff; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .sub-nav-list { display: flex; list-style: none; margin: 0; padding: 0; }

        .hero { background: #007b43; color: white; padding: 60px 20px; text-align: center; }

        .product-item h2 { font-size: 20px; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .platform-label { font-size: 11px; font-weight: bold; color: #666; margin-top: 20px; display: block; text-transform: uppercase; }
        
        iframe { border-radius: 8px; width: 100%; border: none; margin-top: 10px; }
        
        footer { text-align: center; padding: 40px; font-size: 11px; color: #999; }
