<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音源情報 | 夕張工業団地</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary-green: #007b43;
            --dark-green: #004d2c;
            --bg-gray: #f9f9f9;
            --border-color: #eee;
        }

        body {
            margin: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }

        /* ヒーローエリア */
        .hero {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--dark-green) 100%);
            color: white;
            padding: 100px 20px 140px;
            text-align: center;
        }

        .hero p {
            font-size: 12px;
            letter-spacing: 0.4em;
            font-weight: bold;
            opacity: 0.8;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .hero h1 {
            font-size: clamp(24px, 5vw, 40px);
            margin: 0;
            letter-spacing: 0.1em;
        }

        /* コンテンツコンテナ */
        .container {
            max-width: 850px;
            width: 92%;
            margin: -80px auto 60px;
            background: white;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-radius: 4px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        section {
            margin-bottom: 50px;
        }

        h2 {
            font-size: 18px;
            border-left: 4px solid #000;
            padding-left: 15px;
            margin: 0 0 25px;
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        /* カードデザイン */
        .audio-card {
            background: var(--bg-gray);
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .audio-card h3 {
            font-size: 13px;
            margin: 0 0 15px 0;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .audio-card h3::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--primary-green);
            border-radius: 50%;
        }

        /* 埋め込みプレイヤー共通 */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        /* YouTube用レスポンシブ・アスペクト比固定 */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            margin-bottom: 20px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        iframe {
            display: block;
            border: none;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            font-size: 11px;
            color: #999;
            letter-spacing: 0.1em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px 20px;
            }
            .audio-card {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<div id="header-placeholder"></div>

<header class="hero">
    <p>Audio Archive</p>
    <h1>音源・配信情報</h1>
</header>

<main class="container">
    
    <!-- YouTube Section -->
    <section class="audio-section">
        <h2>ライブクリップ プレイリスト</h2>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/videoseries?list=PLtK3Cgd8CRKg2FnMveaa9gCWYwBgnGwou" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>
    </section>

    <!-- SoundCloud Section -->
    <section class="audio-section">
        <h2>SoundCloud(試作品)</h2>
        <div class="audio-card">
            <h3>最新状況</h3>
            <iframe width="100%" height="166" scrolling="no" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/users/924088991&color=%23007b43&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>
        </div>
    </section>

    <!-- Streaming Section -->
    <section class="audio-section">
        <h2>各種ストリーミングサービス</h2>
        <div class="audio-card">
            <h3>Apple Music</h3>
            <iframe allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write" height="175" style="width:100%;max-width:100%;overflow:hidden;border-radius:10px;" sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation" src="https://embed.music.apple.com/jp/album/%E7%B8%B9%E8%89%B2%E3%81%AE%E5%A4%8F-ep/1734931084"></iframe>
        </div>
        
        <div class="audio-card">
            <h3>Spotify</h3>
            <iframe src="https://open.spotify.com/embed/artist/1HwXj1S3hwMTeu5P05A6lG?utm_source=generator&theme=0" width="100%" height="152" loading="lazy" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
        </div>
    </section>

</main>

<footer>
    © 2026 YUBARI INDUSTRIAL DISTRICT All Rights Reserved.
</footer>

<script>
    fetch('header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(error => console.error('Error loading header:', error));
</script>

</body>
</html>
