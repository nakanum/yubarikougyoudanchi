<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>稼働予定/NEWS | 夕張工業団地</title>
    <!-- 設計図を読み込む -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* スマホの文字サイズ自動調整をリセット */
        html { -webkit-text-size-adjust: 100%; }

        body {
            margin: 0;
            background-color: #f4f4f4;
            font-family: sans-serif;
        }

        .hero {
            background: linear-gradient(135deg, #007b43 0%, #004d2c 100%);
            color: white;
            padding: 100px 20px 140px;
            text-align: center;
        }
        .hero p {
            font-size: 12px;
            letter-spacing: 0.3em;
            font-weight: bold;
            opacity: 0.8;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }
        
        .hero h1 {
            font-size: 32px;
            letter-spacing: 0.1em;
            margin: 0;
            line-height: 1.2;
            word-break: break-all;
        }

        .container {
            max-width: 800px;
            width: 92%;
            margin: -80px auto 60px;
            background: white;
            padding: 50px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border-radius: 4px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        h2 {
            font-size: 18px;
            border-left: 5px solid #000;
            padding-left: 15px;
            margin-bottom: 25px;
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        /* X埋め込みカード */
        .audio-card {
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #eee;
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        /* 過去実績への誘導ボタン */
        .ir-link-container {
            text-align: right;
            margin-top: 20px;
        }

        .btn-ir {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #333;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #333;
            padding: 12px 24px;
            transition: all 0.3s ease;
            border-radius: 2px;
            letter-spacing: 0.1em;
        }

        .btn-ir::after {
            content: "→";
            margin-left: 10px;
            transition: transform 0.3s ease;
        }

        .btn-ir:hover {
            background-color: #000;
            color: #fff;
        }

        .btn-ir:hover::after {
            transform: translateX(5px);
        }

        @media (max-width: 768px) {
            .container { padding: 30px 20px; }
            .hero h1 { 
                font-size: clamp(20px, 7vw, 32px) !important; 
            }
            .ir-link-container {
                text-align: center;
            }
            .btn-ir {
                display: block;
            }
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            font-size: 11px;
            color: #999;
        }
    </style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="hero">
    <p>LIVE SCHEDULE/NEWS</p>
    <h1>稼働予定/NEWS</h1>
</div>

<div class="container">
    <section class="audio-section">
        <h2>次回稼働予定</h2>
        <div class="audio-card">
            <blockquote class="twitter-tweet" data-media-hidden="false" data-lang="ja">
                <a href="https://x.com/YKD_DKY/status/2046549196183146863?s=20"></a>
            </blockquote>
            <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
        </div>

        <!-- 過去実績へのリダイレクトリンク -->
        <div class="ir-link-container">
            <a href="ir.html" class="btn-ir">過去の稼働実績はこちら</a>
        </div>
    </section>
</div>

<footer>
    © 2026 YUBARI INDUSTRIAL DISTRICT All Rights Reserved.
</footer>

<script>
    fetch('header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(error => console.error('Error:', error));
</script>

</body>
</html>
