<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夕張工業団地 稼働予定 | 2027-2028</title>
    <!-- 設計図を読み込む -->
    <link rel="stylesheet" href="style.css">
    <style>
        .hero {
            background: linear-gradient(135deg, #007b43 0%, #004d2c 100%);
            color: white;
            padding: 60px 20px 30px;
            text-align: center;
        }
        .hero p {
            font-size: 12px;
            letter-spacing: 0.3em;
            font-weight: bold;
            opacity: 0.8;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }
        .hero h1 {
            font-size: 32px;
            letter-spacing: 0.1em;
            margin: 0;
        }  @media (max-width: 768px) {
            .container { padding: 30px 20px; }
            .hero h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

<div class="hero">
    <p>LIVE SCHEDULE/NEWS</p>
    <h1>稼働予定/NEWS</h1>
</div>

<div id="header-placeholder"></div>
<div class="container" style="margin-top: 40px;">
    <section class="audio-section">
        <h2>Latest Information</h2>
        <div class="audio-card" style="padding: 0; overflow: hidden; border-radius: 12px;">
            <!-- この A タグが JS によってタイムラインに置き換わる -->
            <a class="twitter-timeline" 
               data-height="800" 
               data-theme="light" 
               data-chrome="noheader nofooter noborders" 
               data-link-color="#007b43"
               href="https://twitter.com/YKD_DKY?ref_src=twsrc%5Etfw">
               通信中...
            </a> 
            <!-- このスクリプトが重要。これが TL を生成する -->
            <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
        </div>
    </section>
</div>
</div>

<footer>
    © 2026 YUBARI INDUSTRIAL DISTRICT All Rights Reserved.
</footer>

<script>
    fetch('header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(error => console.error('Error:', error));
</script>
</body>
</html>
