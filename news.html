<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>稼働予定/NEWS | 夕張工業団地</title>
    <!-- 設計図を読み込む -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* スマホの文字サイズ自動調整をリセット */
        html { -webkit-text-size-adjust: 100%; }

        .hero {
            background: linear-gradient(135deg, #007b43 0%, #004d2c 100%);
            color: white;
            padding: 100px 20px 140px;
            text-align: center;
        }
        .hero p {
            font-size: 12px;
            letter-spacing: 0.3em;
            font-weight: bold;
            opacity: 0.8;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }
        
        /* PC/スマホ両対応のフォントサイズ設定 */
        .hero h1 {
            font-size: 32px;
            letter-spacing: 0.1em;
            margin: 0;
            line-height: 1.2;
            word-break: break-all;
        }

        .container {
            max-width: 800px;
            width: 92%;
            margin: -80px auto 60px;
            background: white;
            padding: 50px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border-radius: 4px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        h2 {
            font-size: 20px;
            border-left: 5px solid #000;
            padding-left: 15px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* X埋め込みカードの装飾 */
        .audio-card {
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #eee;
            display: flex;
            justify-content: center;
        }

        /* スマホ用（Recruitに合わせた挙動） */
        @media (max-width: 768px) {
            .container { padding: 30px 20px; }
            .hero h1 { 
                /* 画面幅に合わせて縮小、最大32px/最小20px */
                font-size: clamp(20px, 7vw, 32px) !important; 
            }
        }
    </style>
</head>
<body>

<!-- ヘッダーの差し込み口 -->
<div id="header-placeholder"></div>

<div class="hero">
    <p>LIVE SCHEDULE/NEWS</p>
    <h1>稼働予定/NEWS</h1>
</div>

<div class="container">
    <section class="audio-section">
        <h2>Latest Information</h2>
        <div class="audio-card">
            <!-- X 個別ポスト埋め込みここから（URLを任意のポストに貼り替えて） -->
            <blockquote class="twitter-tweet" data-media-hidden="false" data-lang="ja">
                <a href="https://x.com/YKD_DKY/status/2046549196183146863?s=20"></a>
            </blockquote>
            <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
            <!-- X 個別ポスト埋め込みここまで -->
        </div>
    </section>
</div>

<footer>
    © 2026 YUBARI INDUSTRIAL DISTRICT All Rights Reserved.
</footer>

<script>
    fetch('header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(error => console.error('Error:', error));
</script>

</body>
</html>
